<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion Google Drive…</title>
<style>
body { background:#0A1628; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; flex-direction:column; gap:16px; }
.icon { font-size:48px; }
p { color:#8096B8; font-size:14px; }
</style>
</head>
<body>
<div class="icon">☁️</div>
<h2>Connexion en cours…</h2>
<p>Cette fenêtre va se fermer automatiquement.</p>
<script>
// Récupère le token depuis le hash (flux implicite) ou le code (flux PKCE)
const hash = new URLSearchParams(location.hash.slice(1));
const params = new URLSearchParams(location.search);
const token = hash.get('access_token');
const code  = params.get('code');
const error = params.get('error') || hash.get('error');

if(error) {
  document.querySelector('h2').textContent = 'Erreur : ' + error;
  document.querySelector('.icon').textContent = '❌';
  setTimeout(() => window.close(), 2000);
} else if(token) {
  // Envoie le token à la fenêtre parente
  if(window.opener) {
    window.opener.postMessage({type:'gdrive_token', access_token:token, expires_in:hash.get('expires_in')}, '*');
    window.close();
  } else {
    // Redirige vers la page principale avec le token en hash
    const returnUrl = sessionStorage.getItem('gdrive_return_url') || 'index.html';
    location.href = returnUrl + '#' + location.hash.slice(1);
  }
} else if(code) {
  if(window.opener) {
    window.opener.postMessage({type:'gdrive_code', code}, '*');
    window.close();
  }
} else {
  document.querySelector('h2').textContent = 'Aucun token reçu';
  document.querySelector('.icon').textContent = '⚠️';
}
</script>
</body>
</html>
